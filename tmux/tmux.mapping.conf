# Reload the tmux config
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reloaded!"

# Move windows
bind -r l next-window
bind -r h previous-window
# Hangul IME delivers composed jamo instead of h/l while in Hangul mode
bind -r ㅣ next-window
bind -r ㅗ previous-window

bind -r ] switch-client -n
bind -r [ switch-client -p

bind t new-window -c "#{pane_current_path}"

bind = display-panes "swap-pane -t '%%'"

unbind x
bind x display-menu -T "Close" "Current pane" p kill-pane "Current window" w kill-window

# Vi Mode
bind -r v copy-mode

# Split panes
bind \\ split-window -h
bind - split-window -v

# Move around panes with ALT + arrow keys.
bind -r Up resize-pane -U 5
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Right resize-pane -R 5
bind -r m resize-pane -Z

# lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# unbind default keys
unbind C-b
unbind %
unbind '"'
unbind p
