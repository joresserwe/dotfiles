source-file $XDG_CONFIG_HOME/tmux/tmux.mapping.conf

# Set options
set -as terminal-features ',*:RGB:Sync'
set -as terminal-overrides ',*:Sync=\E[?2026%?%p1%{1}%-%tl%eh%;'

set -g prefix C-a
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 200000
set -g renumber-windows on # renumber all windows when any window is closed
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -g mouse on
set -g allow-passthrough on
set -g window-style 'fg=#6c7086,bg=default'
set -g window-active-style 'fg=terminal,bg=default' # fg=default would fall back to window-style's dim fg
run-shell "~/.config/tmux/pane-dim.sh"

# session
set -g @continuum-restore 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @sessionx-bind 'p'
set -g @fingers-key q

# icon
set -g @catppuccin_session_icon "Ņ×Ģ"
set -g @catppuccin_directory_icon "’ü╗"
set -g @catppuccin_git_icon "’ćō"
set -g @catppuccin_date_time_icon "¾░ā░"

# theme (reference - omerxx/dotfiles)
set -g @catppuccin_window_left_separator "ŅéČ"
set -g @catppuccin_window_right_separator "Ņé┤┬Ā"
set -g @catppuccin_window_middle_separator " Ō¢ł"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(Ņ«ü),}"
set -g @catppuccin_status_modules_right "directory git date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " ŅéČ"
set -g @catppuccin_status_right_separator "Ņé┤ "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%y-%m-%d %H:%M"
set -g @catppuccin_pane_active_border_style "#{?pane_in_mode,fg=#f9e2af,#{?pane_synchronized,fg=#cba6f7,fg=#89b4fa}}"

# List of tmux plugins
set -g @plugin 'tmux-plugins/tpm' # https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'joresserwe/tmux-catppuccin'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'Morantron/tmux-fingers'
#
# Initialize TPM
run '#{HOMEBREW_PREFIX}/opt/tpm/share/tpm/tpm'
