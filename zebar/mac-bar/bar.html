<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'https://esm.sh/react@18?dev';
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
      import * as zebar from 'https://esm.sh/zebar@3.0';

      const providers = zebar.createProviderGroup({
        glazewm: { type: 'glazewm' },
        network: { type: 'network', refreshInterval: 1000 },
        cpu: { type: 'cpu', refreshInterval: 1000 },
        memory: { type: 'memory', refreshInterval: 1000 },
        battery: { type: 'battery' },
        media: { type: 'media' },
        audio: { type: 'audio' },
        systray: { type: 'systray' },
        date: { type: 'date', formatting: 'yyyy년 M월 d일 (EEE) HH:mm', locale: 'ko' },
      });

      createRoot(document.getElementById('root')).render(<App />);

      function networkIcon(n) {
        const t = n.defaultInterface?.type;
        if (t === 'ethernet') return 'nf nf-md-ethernet_cable';
        if (t === 'wifi') {
          const s = n.defaultGateway?.signalStrength ?? 0;
          if (s >= 80) return 'nf nf-md-wifi_strength_4';
          if (s >= 65) return 'nf nf-md-wifi_strength_3';
          if (s >= 40) return 'nf nf-md-wifi_strength_2';
          if (s >= 25) return 'nf nf-md-wifi_strength_1';
          return 'nf nf-md-wifi_strength_outline';
        }
        return 'nf nf-md-wifi_strength_off_outline';
      }

      function batteryIcon(b) {
        if (b.chargePercent > 90) return 'nf nf-fa-battery_4';
        if (b.chargePercent > 70) return 'nf nf-fa-battery_3';
        if (b.chargePercent > 40) return 'nf nf-fa-battery_2';
        if (b.chargePercent > 20) return 'nf nf-fa-battery_1';
        return 'nf nf-fa-battery_0';
      }

      function weatherIcon(w) {
        switch (w.status) {
          case 'clear_day':       return 'nf nf-weather-day_sunny';
          case 'clear_night':     return 'nf nf-weather-night_clear';
          case 'cloudy_day':      return 'nf nf-weather-day_cloudy';
          case 'cloudy_night':    return 'nf nf-weather-night_alt_cloudy';
          case 'light_rain_day':  return 'nf nf-weather-day_sprinkle';
          case 'light_rain_night':return 'nf nf-weather-night_alt_sprinkle';
          case 'heavy_rain_day':  return 'nf nf-weather-day_rain';
          case 'heavy_rain_night':return 'nf nf-weather-night_alt_rain';
          case 'snow_day':        return 'nf nf-weather-day_snow';
          case 'snow_night':      return 'nf nf-weather-night_alt_snow';
          case 'thunder_day':     return 'nf nf-weather-day_lightning';
          case 'thunder_night':   return 'nf nf-weather-night_alt_lightning';
          default:                return 'nf nf-weather-na';
        }
      }

      function weatherTint(status) {
        if (!status) return '';
        if (status.startsWith('thunder'))    return 'thunder';
        if (status.startsWith('snow'))       return 'snow';
        if (status.includes('rain'))         return 'rain';
        if (status.startsWith('clear_day'))  return 'sun';
        if (status.endsWith('_night'))       return 'moon';
        return '';
      }

      function formatRate(m) {
        if (!m) return '0 B';
        const v = m.siValue;
        const u = m.siUnit;
        return `${v < 10 ? v.toFixed(1) : Math.round(v)} ${u}`;
      }

      function volumeIcon(d) {
        if (d.isMuted || d.volume === 0) return 'nf nf-md-volume_off';
        if (d.volume < 34) return 'nf nf-md-volume_low';
        if (d.volume < 67) return 'nf nf-md-volume_medium';
        return 'nf nf-md-volume_high';
      }

      function memoryColor(pct) {
        if (pct >= 90) return 'rgb(255, 120, 120)';     // red
        if (pct >= 75) return 'rgb(255, 170, 100)';     // orange
        if (pct >= 50) return 'rgb(230, 210, 120)';     // yellow
        return 'rgb(180, 220, 150)';                     // green (default)
      }

      function cpuColor(pct) {
        if (pct >= 90) return 'rgb(255, 120, 120)';     // red
        if (pct >= 75) return 'rgb(255, 170, 100)';     // orange
        if (pct >= 50) return 'rgb(230, 210, 120)';     // yellow
        return 'rgb(140, 190, 255)';                     // blue (default)
      }


      // Systray tooltip substrings to hide. Case-insensitive. Zebar's visibility
      // filter is racy (TBSTATE_HIDDEN is read via message events that fire
      // sparsely), so we enforce our own stable blocklist.
      const SYSTRAY_BLOCKLIST = [
        'microsoft defender',
        'icue',
        'logitech g hub',
        'sonic suite companion',
        'glaze',
        'zebar',
      ];
      function isBlockedTrayIcon(tooltip) {
        const t = (tooltip || '').toLowerCase();
        return SYSTRAY_BLOCKLIST.some(b => t.includes(b));
      }

      const CAT_FRAME_URLS = [0, 1, 2, 3, 4].map(
        i => `https://cdn.jsdelivr.net/gh/Kyome22/menubar_runcat@master/resources/cat/png/${i}.png`
      );

      const SPARK_SAMPLES = 30;
      const SPARK_W = 44;
      const SPARK_H = 14;

      function Sparkline({ value, color, gradId }) {
        const [samples, setSamples] = useState([]);
        useEffect(() => {
          if (value == null) return;
          setSamples(prev => [...prev, value].slice(-SPARK_SAMPLES));
        }, [value]);

        if (samples.length < 2) return null;

        const pts = samples.map((v, i) => {
          const x = (i / (SPARK_SAMPLES - 1)) * SPARK_W;
          const y = SPARK_H - (Math.min(100, Math.max(0, v)) / 100) * SPARK_H;
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        });
        const line = `M ${pts.join(' L ')}`;
        const area = `M ${pts[0].split(',')[0]},${SPARK_H} L ${pts.join(' L ')} L ${SPARK_W},${SPARK_H} Z`;

        return (
          <svg className="sparkline" viewBox={`0 0 ${SPARK_W} ${SPARK_H}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stopColor={color} stopOpacity="0.55" />
                <stop offset="100%" stopColor={color} stopOpacity="0" />
              </linearGradient>
            </defs>
            <path d={area} fill={`url(#${gradId})`} />
            <path d={line} fill="none" stroke={color} strokeWidth="1" strokeLinejoin="round" strokeLinecap="round" />
          </svg>
        );
      }

      function useImeState() {
        const [ime, setIme] = useState(null);
        useEffect(() => {
          let alive = true;
          const poll = async () => {
            try {
              const r = await zebar.shellExec('cmd.exe', ['/c', 'type', '%TEMP%\\ime-state.txt']);
              if (alive) setIme((r.stdout || '').trim() || null);
            } catch { /* file may not exist yet */ }
          };
          poll();
          const id = setInterval(poll, 400);
          return () => { alive = false; clearInterval(id); };
        }, []);
        return ime;
      }

      function RunCat({ cpuUsage }) {
        const [frame, setFrame] = useState(0);
        useEffect(() => {
          // Preload all frames once
          CAT_FRAME_URLS.forEach(u => { const img = new Image(); img.src = u; });
        }, []);
        useEffect(() => {
          // 0% → 220ms/frame (idle trot), 100% → 20ms/frame (sprint)
          const pct = Math.min(100, Math.max(0, cpuUsage ?? 0));
          const interval = Math.max(20, 220 - pct * 2);
          const id = setInterval(() => setFrame(f => (f + 1) % 5), interval);
          return () => clearInterval(id);
        }, [cpuUsage]);
        return <img className="runcat" src={CAT_FRAME_URLS[frame]} alt="" />;
      }

      function App() {
        const [out, setOut] = useState(providers.outputMap);
        useEffect(() => providers.onOutput(() => setOut(providers.outputMap)), []);
        const ime = useImeState();

        return (
          <div className="app">
            <div className="left">
              <i className="logo nf nf-fa-windows"></i>
              {out.glazewm && (
                <div className="workspaces">
                  {out.glazewm.currentWorkspaces.map(ws => (
                    <button
                      key={ws.name}
                      className={`ws ${ws.hasFocus ? 'focused' : ''} ${ws.isDisplayed ? 'displayed' : ''}`}
                      onClick={() => out.glazewm.runCommand(`focus --workspace ${ws.name}`)}
                    >
                      {ws.displayName ?? ws.name}
                    </button>
                  ))}
                </div>
              )}
              {out.glazewm?.isPaused && (
                <button className="pill paused" onClick={() => out.glazewm.runCommand('wm-toggle-pause')}>
                  PAUSED
                </button>
              )}
              {out.glazewm?.bindingModes.map(m => (
                <button
                  key={m.name}
                  className="pill mode"
                  onClick={() => out.glazewm.runCommand(`wm-disable-binding-mode --name ${m.name}`)}
                >
                  {m.displayName ?? m.name}
                </button>
              ))}
              {out.glazewm?.focusedContainer?.type === 'window' && out.glazewm.focusedContainer.processName && (
                <span
                  className="focused-title"
                  title={out.glazewm.focusedContainer.title || out.glazewm.focusedContainer.processName}
                >
                  {out.glazewm.focusedContainer.processName.replace(/\.exe$/i, '')}
                </span>
              )}
            </div>

            <div className="right">
              {out.media?.currentSession?.title && (
                <button
                  className={`stat media ${out.media.currentSession.isPlaying ? 'playing' : 'paused'}`}
                  onClick={() => out.media.togglePlayPause()}
                  title={`${out.media.currentSession.title}${out.media.currentSession.artist ? ' — ' + out.media.currentSession.artist : ''}`}
                >
                  {out.media.currentSession.isPlaying ? (
                    <span className="viz"><span/><span/><span/></span>
                  ) : (
                    <i className="nf nf-md-pause"></i>
                  )}
                  <span className="media-title">{out.media.currentSession.title}</span>
                </button>
              )}
              {out.cpu && <RunCat cpuUsage={out.cpu.usage} />}
              {ime && (
                <span className={`ime divider-left ime-${ime.toLowerCase()}`}>{ime}</span>
              )}
              {out.cpu && (
                <span className="stat compact divider-left">
                  <i className="nf nf-oct-cpu"></i>
                  <span
                    className="metric"
                    style={out.cpu.usage >= 75 ? { color: cpuColor(out.cpu.usage) } : undefined}
                  >{Math.round(out.cpu.usage)}%</span>
                  <Sparkline value={out.cpu.usage} color={cpuColor(out.cpu.usage)} gradId="sp-cpu" />
                </span>
              )}
              {out.memory && (
                <span className="stat compact">
                  <i className="nf nf-fae-chip"></i>
                  <span
                    className="metric"
                    style={out.memory.usage >= 75 ? { color: memoryColor(out.memory.usage) } : undefined}
                  >{Math.round(out.memory.usage)}%</span>
                  <Sparkline value={out.memory.usage} color={memoryColor(out.memory.usage)} gradId="sp-mem" />
                </span>
              )}
              {out.audio?.defaultPlaybackDevice && (
                <span className={`stat compact audio ${out.audio.defaultPlaybackDevice.isMuted ? 'muted' : ''}`}>
                  <i className={volumeIcon(out.audio.defaultPlaybackDevice)}></i>
                  <span className="metric">{Math.round(out.audio.defaultPlaybackDevice.volume)}%</span>
                </span>
              )}
              {out.network && (
                <span className="stat network">
                  <i className={networkIcon(out.network)}></i>
                  {out.network.traffic && (
                    <span className="traffic">
                      <span className="traffic-row up">
                        <span className="traffic-label">U</span>{formatRate(out.network.traffic.transmitted)}
                      </span>
                      <span className="traffic-row down">
                        <span className="traffic-label">D</span>{formatRate(out.network.traffic.received)}
                      </span>
                    </span>
                  )}
                </span>
              )}
              {out.battery && (
                <span className={`stat compact battery ${out.battery.isCharging ? 'charging' : ''}`}>
                  {out.battery.isCharging && <i className="nf nf-md-power_plug charging-icon"></i>}
                  <i className={batteryIcon(out.battery)}></i>
                  <span className="metric">{Math.round(out.battery.chargePercent)}%</span>
                </span>
              )}
              {(() => {
                const visibleIcons = (out.systray?.icons || []).filter(i => !isBlockedTrayIcon(i.tooltip));
                if (!visibleIcons.length) return null;
                return (
                  <span className="systray">
                    {visibleIcons.map(icon => (
                      <button
                        key={icon.id}
                        className="tray-icon"
                        title={icon.tooltip}
                        onClick={() => out.systray.onLeftClick(icon.id)}
                        onContextMenu={e => { e.preventDefault(); out.systray.onRightClick(icon.id); }}
                      >
                        <img src={icon.iconUrl} alt="" />
                      </button>
                    ))}
                  </span>
                );
              })()}
              {out.date && <span className="clock">{out.date.formatted}</span>}
            </div>
          </div>
        );
      }
    </script>
  </body>
</html>
